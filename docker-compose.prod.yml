# docker-compose.prod.yml — Production deployment with hardened settings
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Copy .env.example to .env and set production values
#   2. Set strong POSTGRES_PASSWORD
#   3. Configure at least one LLM API key

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: moran
      POSTGRES_USER: moran
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Do NOT expose port externally in production
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moran"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - moran-internal

  moran-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://moran:${POSTGRES_PASSWORD}@postgres:5432/moran
      OPENCODE_PORT: 3100
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
    ports:
      - "${SERVER_PORT:-3200}:3200"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - moran-internal

  moran-web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    restart: unless-stopped
    depends_on:
      moran-server:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3200}
    ports:
      - "${WEB_PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - moran-internal

  # Optional: Database backup service
  # Runs pg_dump daily at 3:00 AM
  db-backup:
    image: postgres:17-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: moran
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: moran
    volumes:
      - db-backups:/backups
    entrypoint: /bin/sh
    command: >
      -c 'while true; do
        BACKUP_FILE="/backups/moran_$$(date +%Y%m%d_%H%M%S).sql.gz";
        pg_dump | gzip > "$$BACKUP_FILE";
        echo "Backup completed: $$BACKUP_FILE";
        find /backups -name "*.sql.gz" -mtime +7 -delete;
        echo "Cleaned backups older than 7 days";
        sleep 86400;
      done'
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - moran-internal

volumes:
  pgdata:
    driver: local
  db-backups:
    driver: local

networks:
  moran-internal:
    driver: bridge
