name: CI - E2E Tests

on:
  push:
    branches: [main, v2-rewrite]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Start test services
        run: docker compose -f docker-compose.dev.yml up -d --wait

      - name: Install Playwright browsers
        run: pnpm --filter @moran/web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @moran/web run test:e2e
        env:
          DATABASE_URL: postgresql://moran:test_password@localhost:5433/moran_test
          NEXT_PUBLIC_API_URL: http://localhost:3200

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 14

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v
