# docker-compose.test.yml — Integration test environment (ephemeral PG)
services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: moran_test
      POSTGRES_USER: moran
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moran"]
      interval: 3s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
